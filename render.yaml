services:
  - type: web
    name: tenderpilot
    runtime: static
    buildCommand: echo "Static site"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /tenderpilot
        destination: /tenderpilot/index.html
      - type: rewrite
        source: /grantpilot
        destination: /grantpilot/index.html
      - type: rewrite
        source: /tenderpilot/demo
        destination: /tenderpilot/portal.html
      - type: rewrite
        source: /grantpilot/demo
        destination: /grantpilot/portal.html
      - type: rewrite
        source: /grantpilot/register
        destination: /grantpilot/onboarding.html
      - type: rewrite
        source: /grantpilot/partner
        destination: /grantpilot/partner.html
      - type: rewrite
        source: /grantpilot/meeting
        destination: /grantpilot/meeting-brief.html
      - type: rewrite
        source: /grantpilot/agreements
        destination: /grantpilot/agreements.html
