services:
  - type: web
    name: tenderpilot
    runtime: static
    buildCommand: echo "Static site"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /tenderpilot
        destination: /tenderpilot/index.html
      - type: rewrite
        source: /aipalyazo
        destination: /aipalyazo/index.html
      - type: rewrite
        source: /tenderpilot/demo
        destination: /tenderpilot/portal.html
      - type: rewrite
        source: /aipalyazo/demo
        destination: /aipalyazo/portal.html
      - type: rewrite
        source: /aipalyazo/register
        destination: /aipalyazo/onboarding.html
      - type: rewrite
        source: /aipalyazo/partner
        destination: /aipalyazo/partner.html
      - type: rewrite
        source: /aipalyazo/meeting
        destination: /aipalyazo/meeting-brief.html
      - type: rewrite
        source: /aipalyazo/agreements
        destination: /aipalyazo/agreements.html
      - type: rewrite
        source: /aipalyazo/adatvedelem
        destination: /aipalyazo/adatvedelem.html
      - type: rewrite
        source: /aipalyazo/impresszum
        destination: /aipalyazo/impresszum.html
      - type: rewrite
        source: /aipalyazo/aszf
        destination: /aipalyazo/aszf.html
