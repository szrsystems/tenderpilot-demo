<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Az oldal nem található — 404</title>
    <!-- GitHub Pages only serves a custom 404 from the site root, so this
         file lives here and routes the visitor back to the right product
         section (aipalyazo/ or tenderpilot/) based on the missed path. -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #ffffff 0%, #f0fdf4 100%); color: #1f2937;
            padding: 24px; text-align: center;
        }
        .code { font-size: 88px; font-weight: 800; color: #16a34a; line-height: 1; }
        h1 { font-size: 22px; margin: 14px 0 8px; }
        p { font-size: 15px; color: #6b7280; max-width: 420px; margin: 0 auto 26px; line-height: 1.6; }
        .btn {
            display: inline-block; padding: 12px 26px; border-radius: 10px; font-weight: 600;
            font-size: 15px; text-decoration: none; background: #16a34a; color: white; margin: 0 6px 10px;
        }
        .btn.ghost { background: white; color: #16a34a; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>
    <main>
        <div class="code">404</div>
        <h1>Ez az oldal nem található</h1>
        <p>Lehet, hogy a link elavult, vagy elgépelés történt. Az alábbi gombbal visszajut a főoldalra.</p>
        <a class="btn" id="home-btn" href="/">Vissza a főoldalra</a>
        <a class="btn ghost" id="portal-btn" href="#" style="display:none;">Pályázat-kereső megnyitása</a>
    </main>
    <script>
        // Route back into the section the visitor was browsing.
        var p = location.pathname;
        var base = p.indexOf('/aipalyazo/') !== -1 ? p.slice(0, p.indexOf('/aipalyazo/')) + '/aipalyazo/'
                 : p.indexOf('/tenderpilot/') !== -1 ? p.slice(0, p.indexOf('/tenderpilot/')) + '/tenderpilot/'
                 : null;
        if (base) {
            document.getElementById('home-btn').href = base + 'index.html';
            var pb = document.getElementById('portal-btn');
            pb.href = base + 'portal.html';
            pb.style.display = 'inline-block';
        } else {
            // Repo-relative root (works both on github.io/<repo>/ and a custom domain)
            document.getElementById('home-btn').href = p.split('/').slice(0, 2).join('/') + '/';
        }
    </script>
</body>
</html>
