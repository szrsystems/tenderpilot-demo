<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Az oldal nem található — TenderPilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --blue-600: #2563eb; --blue-700: #1d4ed8; --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: var(--gray-900); background: linear-gradient(180deg, white 0%, #eff6ff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; color: var(--gray-900); text-decoration: none; }
        .logo span { color: var(--blue-600); }
        .code { font-size: 96px; font-weight: 800; color: var(--blue-600); letter-spacing: -3px; line-height: 1; margin-bottom: 12px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        p { font-size: 16px; color: var(--gray-500); max-width: 480px; line-height: 1.6; margin-bottom: 32px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; text-decoration: none; }
        .btn-primary { background: var(--blue-600); color: white; }
        .btn-primary:hover { background: var(--blue-700); }
        .btn-secondary { background: white; color: var(--gray-700); border: 1px solid #d1d5db; }
        .btn-secondary:hover { background: #f9fafb; }
    </style>
</head>
<body>
    <a href="index.html" class="logo">Tender<span>Pilot/span></a>
    <div class="code">404</div>
    <h1>Az oldal nem található</h1>
    <p>Lehet, hogy a link elavult, vagy elírás történt. Térjen vissza a főoldalra, vagy nézze meg az aktuális pályázatokat.</p>
    <div class="actions">
        <a href="index.html" class="btn btn-primary">← Főoldal</a>
        <a href="portal.html" class="btn btn-secondary">Demo portál</a>
    </div>
</body>
</html>
