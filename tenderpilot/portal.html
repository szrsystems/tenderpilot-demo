<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenderPilot — Ügyfél Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe; --blue-500: #3b82f6; --blue-600: #2563eb; --blue-700: #1d4ed8; --blue-800: #1e40af;
            --green-50: #f0fdf4; --green-100: #dcfce7; --green-500: #22c55e; --green-600: #16a34a; --green-800: #166534;
            --amber-100: #fef3c7; --amber-600: #d97706; --amber-800: #92400e;
            --red-100: #fee2e2; --red-600: #dc2626; --red-800: #991b1b;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
            --radius: 8px; --radius-lg: 12px;
            --sidebar-w: 240px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-900); -webkit-font-smoothing: antialiased; }

        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: white; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-100); }
        .sidebar-logo { font-size: 18px; font-weight: 800; }
        .sidebar-logo span { color: var(--blue-600); }
        .sidebar-nav { flex: 1; padding: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 500; color: var(--gray-600); cursor: pointer; transition: all 0.1s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
        .nav-item.active { background: var(--blue-50); color: var(--blue-700); font-weight: 600; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--blue-600); color: white; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--gray-100); }
        .sidebar-user { font-size: 13px; font-weight: 600; color: var(--gray-700); }
        .sidebar-plan { font-size: 12px; color: var(--gray-400); }

        .main { margin-left: var(--sidebar-w); min-height: 100vh; }
        .topbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 16px; font-weight: 700; }
        .btn-sm { padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 6px; border: 1px solid var(--gray-300); background: white; color: var(--gray-700); cursor: pointer; }
        .btn-sm:hover { background: var(--gray-50); }
        .btn-sm.primary { background: var(--blue-600); color: white; border-color: var(--blue-600); }
        .btn-sm.primary:hover { background: var(--blue-700); }
        .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

        .content { padding: 24px 32px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 20px; }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .stat-sub { font-size: 12px; color: var(--green-600); font-weight: 600; margin-top: 4px; }

        .card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 15px; font-weight: 700; }

        .tender-row { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); display: grid; grid-template-columns: 1fr 100px 80px 80px 72px; gap: 12px; align-items: center; cursor: pointer; transition: background 0.1s; }
        .tender-row:hover { background: var(--gray-50); }
        .tender-row:last-child { border-bottom: none; }
        .tender-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .tender-source { font-size: 12px; color: var(--gray-400); }
        .tender-value { font-size: 13px; font-weight: 600; }
        .tender-days { font-size: 13px; }
        .tender-days.urgent { color: var(--red-600); font-weight: 600; }

        .verdict { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-align: center; }
        .v-strong { background: var(--green-100); color: var(--green-800); }
        .v-bid { background: var(--blue-100); color: var(--blue-800); }
        .v-weak { background: var(--amber-100); color: var(--amber-800); }
        .v-nobid { background: var(--red-100); color: var(--red-800); }

        .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 60; }
        .detail-overlay.open { display: block; }
        .detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 520px; background: white; border-left: 1px solid var(--gray-200); z-index: 70; transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; }
        .detail-panel.open { transform: translateX(0); }
        .detail-top { padding: 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: flex-start; }
        .detail-close { background: none; border: 1px solid var(--gray-300); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 14px; color: var(--gray-500); }
        .detail-body { padding: 20px; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .label { color: var(--gray-500); }
        .detail-row .value { font-weight: 600; }
        .score-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
        .score-bar-row .bar-label { width: 100px; color: var(--gray-500); flex-shrink: 0; }
        .score-bar-row .bar-bg { flex: 1; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
        .score-bar-row .bar-fill { height: 100%; border-radius: 3px; }
        .score-bar-row .bar-num { width: 28px; text-align: right; font-weight: 600; }

        .doc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px 20px; }
        .doc-card { padding: 14px; border: 1px solid var(--gray-200); border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; }
        .doc-card:hover { border-color: var(--blue-200); }
        .doc-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .doc-meta { font-size: 11px; color: var(--gray-400); }

        .alert-item { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); display: flex; gap: 12px; }
        .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .alert-dot.green { background: var(--green-500); }
        .alert-dot.amber { background: var(--amber-600); }
        .alert-dot.red { background: var(--red-600); }

        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .tender-row { grid-template-columns: 1fr 80px; }
            .tender-row > *:nth-child(2), .tender-row > *:nth-child(3) { display: none; }
            .detail-panel { width: 100%; }
            .content { padding: 16px; }
            .doc-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

function vClass(v) { return v==='STRONG BID'?'v-strong':v==='BID'?'v-bid':v==='WEAK BID'?'v-weak':'v-nobid'; }

function renderRow(t) {
    return `<div class="tender-row" onclick="showDetail('${t.id}')">
        <div><div class="tender-name">${t.title}</div><div class="tender-source">${t.buyer} · ${t.country==='AT'?'🇦🇹':'🇭🇺'} ${t.city}</div></div>
        <div class="tender-value">€${(t.value/1000).toFixed(0)}K</div>
        <div class="tender-days ${t.days<30?'urgent':''}">${t.days}d</div>
        <div style="font-size:12px;color:var(--gray-400);">${t.country}</div>
        <div><span class="verdict ${vClass(t.verdict)}">${t.score}</span></div>
    </div>`;
}

function showPage(p) {
    document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
    document.getElementById('page-'+p).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.nav-item')[['dashboard','tenders','documents','alerts','profile'].indexOf(p)].classList.add('active');
    if (p==='dashboard') initDashboard();
    if (p==='tenders') initTenders();
    if (p==='documents') initDocuments();
    if (p==='alerts') initAlerts();
    if (p==='profile') initProfile();
}

function initDashboard() {
    const strong = T.filter(t=>t.verdict==='STRONG BID').length;
    const totalVal = T.filter(t=>t.score>=70).reduce((s,t)=>s+t.value,0);
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat"><div class="stat-label">Összes kiírás</div><div class="stat-value">${T.length}</div><div class="stat-sub">${T.filter(t=>t.country==='AT').length} AT + ${T.filter(t=>t.country==='HU').length} HU</div></div>
        <div class="stat"><div class="stat-label">Erős egyezés</div><div class="stat-value" style="color:var(--green-600);">${strong}</div><div class="stat-sub">Azonnali teendő</div></div>
        <div class="stat"><div class="stat-label">Pipeline érték</div><div class="stat-value">€${(totalVal/1e6).toFixed(1)}M</div><div class="stat-sub">Pontszám ≥70</div></div>
        <div class="stat"><div class="stat-label">Kész dokumentumok</div><div class="stat-value">${DOCS.length}</div><div class="stat-sub">${new Set(DOCS.map(d=>d.tender)).size} kiírás lefedve</div></div>`;
    document.getElementById('hot-list').innerHTML = T.filter(t=>t.score>=85).sort((a,b)=>a.days-b.days).slice(0,5).map(renderRow).join('');
}

function initTenders() { document.getElementById('all-list').innerHTML = T.map(renderRow).join(''); }

function filterTenders() {
    const s = document.getElementById('search').value.toLowerCase();
    const v = document.getElementById('filter-v').value;
    const c = document.getElementById('filter-c').value;
    const f = T.filter(t => {
        if (s && !t.title.toLowerCase().includes(s) && !t.buyer.toLowerCase().includes(s)) return false;
        if (v !== 'all' && t.verdict !== v) return false;
        if (c !== 'all' && t.country !== c) return false;
        return true;
    });
    document.getElementById('all-list').innerHTML = f.map(renderRow).join('');
}

function showDetail(id) {
    const t = T.find(x=>x.id===id);
    if (!t) return;
    const dv = document.getElementById('detail-verdict');
    dv.className = `verdict ${vClass(t.verdict)}`;
    dv.textContent = `${t.score}/100 — ${t.verdict}`;
    document.getElementById('detail-title').textContent = t.title;

    const barColor = s => s>=85?'var(--green-500)':s>=70?'var(--blue-500)':s>=55?'var(--amber-600)':'var(--red-600)';
    const bar = (l,s) => `<div class="score-bar-row"><span class="bar-label">${l}</span><div class="bar-bg"><div class="bar-fill" style="width:${s}%;background:${barColor(s)};"></div></div><span class="bar-num">${s}</span></div>`;
    const f = t.factors;
    const docs = DOCS.filter(d=>d.tender===t.id);

    document.getElementById('detail-body').innerHTML = `
        <div class="detail-section">
            <h3>Overview</h3>
            <p style="font-size:13px;color:var(--gray-600);line-height:1.6;margin-bottom:12px;">${t.scope}</p>
            <div class="detail-row"><span class="label">Buyer</span><span class="value">${t.buyer}</span></div>
            <div class="detail-row"><span class="label">Location</span><span class="value">${t.city}, ${t.country}</span></div>
            <div class="detail-row"><span class="label">Value</span><span class="value">€${t.value.toLocaleString()}</span></div>
            <div class="detail-row"><span class="label">Deadline</span><span class="value" style="color:${t.days<30?'var(--red-600)':'inherit'};font-weight:700;">${t.deadline} (${t.days}d)</span></div>
        </div>
        <div class="detail-section">
            <h3>12-Factor Qualification (${t.score}/100)</h3>
            ${bar('Category Fit',f.cat)}${bar('Value Range',f.val)}${bar('Deadline',f.deadline)}${bar('Certifications',f.certs)}${bar('Bond Capacity',f.bond)}${bar('Language',f.lang)}${bar('Location',f.loc)}${bar('Experience',f.exp)}${bar('References',f.refs)}${bar('Company Size',f.size)}${bar('Financial',f.fin)}${bar('Competition',f.comp)}
        </div>
        ${docs.length > 0 ? `<div class="detail-section">
            <h3>Documents (${docs.length})</h3>
            ${docs.map(d=>`<div style="padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px;display:flex;justify-content:space-between;"><span><strong>${d.type}</strong> · ${d.title} · ${d.lang}</span><span style="color:var(--gray-400);">${d.chars.toLocaleString()} chars</span></div>`).join('')}
        </div>` : '<div class="detail-section"><h3>Documents</h3><p style="font-size:13px;color:var(--gray-400);">Not yet generated. Click "Generate Documents" below.</p></div>'}
        <div class="detail-section">
            <h3>Telegram Alert Preview</h3>
            <div style="background:#1a2332;color:#e8e8e8;border-radius:12px;padding:16px;font-size:12px;line-height:1.6;">
                <div style="color:#5eabed;font-weight:600;margin-bottom:8px;">TenderPilot</div>
                <div style="font-weight:600;margin-bottom:6px;">${t.country==='AT'?'🇦🇹':'🇭🇺'} ${t.title.slice(0,60)}</div>
                <div style="color:#8e9ba8;">📊 ${t.score}/100 | ${t.verdict}</div>
                <div style="color:#8e9ba8;">💰 €${(t.value/1000).toFixed(0)}K | ⏰ ${t.days}d left</div>
                <div style="color:#8e9ba8;">🏢 ${t.buyer}</div>
            </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:20px;">
            <button class="btn-sm primary" style="flex:1;" onclick="closeDetail()">Dokumentumok generálása</button>
            <button class="btn-sm" onclick="closeDetail()">Bezárás</button>
        </div>`;

    document.getElementById('detail-overlay').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');
}

function initDocuments() {
    document.getElementById('doc-count').textContent = `${DOCS.length} dokumentum · ${new Set(DOCS.map(d=>d.tender)).size} kiírás`;
    document.getElementById('doc-grid').innerHTML = DOCS.map(d => {
        const t = T.find(x=>x.id===d.tender);
        return `<div class="doc-card"><div class="doc-title">${d.type}</div><div class="doc-meta">${d.title} · ${d.lang} · ${d.chars.toLocaleString()} karakter</div><div class="doc-meta" style="margin-top:4px;">Kiírás: ${t?t.title.slice(0,45)+'...':d.tender}</div></div>`;
    }).join('');
}

function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
}

function runScan() { const b=document.getElementById('scan-btn');b.disabled=true;b.textContent='Keresés...';setTimeout(()=>{b.disabled=false;b.textContent='Új keresés';},3000); }
function exportCSV() {
    let csv='ID,Title,Buyer,Country,Value,Deadline,Days,Score,Verdict\n';
    T.forEach(t=>csv+=`"${t.id}","${t.title}","${t.buyer}","${t.country}",${t.value},"${t.deadline}",${t.days},${t.score},"${t.verdict}"\n`);
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tenderpilot-export.csv';a.click();
}
