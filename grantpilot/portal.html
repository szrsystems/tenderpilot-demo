<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrantPilot — Áttekintés</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green-50: #f0fdf4; --green-100: #dcfce7; --green-200: #bbf7d0; --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d; --green-800: #166534;
            --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-600: #2563eb;
            --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-600: #d97706;
            --red-50: #fef2f2; --red-100: #fee2e2; --red-600: #dc2626;
            --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
            --radius: 8px; --radius-lg: 12px;
            --sidebar-w: 240px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-50); color: var(--gray-900); -webkit-font-smoothing: antialiased; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: white; border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; z-index: 50; }
        .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--gray-100); }
        .sidebar-logo { font-size: 18px; font-weight: 800; color: var(--gray-900); }
        .sidebar-logo span { color: var(--green-600); }
        .sidebar-nav { flex: 1; padding: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 500; color: var(--gray-600); cursor: pointer; transition: all 0.1s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
        .nav-item.active { background: var(--green-50); color: var(--green-700); font-weight: 600; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-badge { margin-left: auto; background: var(--green-600); color: white; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--gray-100); }
        .sidebar-user { font-size: 13px; font-weight: 600; color: var(--gray-700); }
        .sidebar-plan { font-size: 12px; color: var(--gray-400); }

        /* MAIN */
        .main { margin-left: var(--sidebar-w); min-height: 100vh; }
        .topbar { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 16px; font-weight: 700; }
        .topbar-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 6px; border: 1px solid var(--gray-300); background: white; color: var(--gray-700); cursor: pointer; transition: all 0.1s; }
        .btn-sm:hover { background: var(--gray-50); }
        .btn-sm.primary { background: var(--green-600); color: white; border-color: var(--green-600); }
        .btn-sm.primary:hover { background: var(--green-700); }
        .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

        .content { padding: 24px 32px; }

        /* STATS */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 20px; }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .stat-sub { font-size: 12px; color: var(--green-600); font-weight: 600; margin-top: 4px; }

        /* CARD */
        .card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { font-size: 15px; font-weight: 700; }
        .card-header span { font-size: 12px; color: var(--gray-400); }

        /* GRANT LIST */
        .grant-row { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); display: grid; grid-template-columns: 1fr 120px 80px 80px 72px; gap: 12px; align-items: center; cursor: pointer; transition: background 0.1s; }
        .grant-row:hover { background: var(--gray-50); }
        .grant-row:last-child { border-bottom: none; }
        .grant-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .grant-source { font-size: 12px; color: var(--gray-400); }
        .grant-amount { font-size: 13px; font-weight: 600; color: var(--gray-700); }
        .grant-days { font-size: 13px; color: var(--gray-500); }
        .grant-days.urgent { color: var(--red-600); font-weight: 600; }
        .grant-cat { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; background: var(--gray-100); color: var(--gray-600); white-space: nowrap; }

        .verdict { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-align: center; }
        .verdict-apply { background: var(--green-100); color: var(--green-800); }
        .verdict-review { background: var(--blue-100); color: var(--blue-600); }
        .verdict-skip { background: var(--gray-100); color: var(--gray-500); }

        /* DETAIL PANEL */
        .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 60; }
        .detail-overlay.open { display: block; }
        .detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 480px; background: white; border-left: 1px solid var(--gray-200); z-index: 70; transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; }
        .detail-panel.open { transform: translateX(0); }
        .detail-top { padding: 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: flex-start; }
        .detail-close { background: none; border: 1px solid var(--gray-300); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 14px; color: var(--gray-500); }
        .detail-body { padding: 20px; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-row .label { color: var(--gray-500); }
        .detail-row .value { font-weight: 600; }
        .score-bars { margin-top: 8px; }
        .score-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
        .score-bar-row .bar-label { width: 100px; color: var(--gray-500); flex-shrink: 0; }
        .score-bar-row .bar-bg { flex: 1; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
        .score-bar-row .bar-fill { height: 100%; border-radius: 3px; }
        .score-bar-row .bar-num { width: 28px; text-align: right; font-weight: 600; color: var(--gray-700); }

        /* ALERTS */
        .alert-item { padding: 14px 20px; border-bottom: 1px solid var(--gray-100); display: flex; gap: 12px; }
        .alert-item:last-child { border-bottom: none; }
        .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        .alert-dot.green { background: var(--green-500); }
        .alert-dot.amber { background: var(--amber-600); }
        .alert-dot.red { background: var(--red-600); }
        .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .alert-text { font-size: 12px; color: var(--gray-500); line-height: 1.4; }
        .alert-time { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

        /* PROFILE */
        .profile-section { padding: 20px; }
        .profile-header { display: flex; gap: 16px; align-items: center; margin-bottom: 24px; }
        .profile-avatar { width: 56px; height: 56px; background: var(--green-100); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: var(--green-700); }
        .profile-name { font-size: 18px; font-weight: 700; }
        .profile-meta { font-size: 13px; color: var(--gray-500); }
        .tag-list { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 0; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; background: var(--green-50); color: var(--green-700); border: 1px solid var(--green-200); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .grant-row { grid-template-columns: 1fr 80px; }
            .grant-row > *:nth-child(2), .grant-row > *:nth-child(4) { display: none; }
            .detail-panel { width: 100%; }
            .content { padding: 16px; }
        }
    </style>
</head>

    try {
        const dl = new Date(g.deadline);
        const now = new Date();
        g.days = Math.max(0, Math.ceil((dl - now) / (1000*60*60*24)));
    } catch(e) { g.days = 90; }
    const f = g.factors;
    g.score = Math.round((f.size*25 + f.industry*25 + f.location*20 + f.deadline*15 + f.preference*15) / 100 * 10) / 10;
    g.verdict = g.score >= 80 ? 'APPLY' : g.score >= 60 ? 'REVIEW' : 'SKIP';
});

let currentPage = 'dashboard';

function showPage(p) {
    currentPage = p;
    document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
    document.getElementById('page-'+p).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.nav-item')[['dashboard','grants','alerts','profile'].indexOf(p)].classList.add('active');
    if (p === 'dashboard') initDashboard();
    if (p === 'grants') initGrants();
    if (p === 'alerts') initAlerts();
    if (p === 'profile') initProfile();
}

function vClass(v) { return v === 'APPLY' ? 'verdict-apply' : v === 'REVIEW' ? 'verdict-review' : 'verdict-skip'; }
function vText(v) { return v === 'APPLY' ? 'Ajánlott' : v === 'REVIEW' ? 'Áttekintendő' : 'Nem ajánlott'; }

function renderRow(g) {
    return `<div class="grant-row" onclick="showDetail('${g.id}')">
        <div><div class="grant-name">${g.title}</div><div class="grant-source">${g.source}</div></div>
        <div class="grant-amount">${g.amount}</div>
        <div class="grant-days ${g.days < 30 ? 'urgent' : ''}">${g.days} nap</div>
        <div><span class="grant-cat">${g.cat}</span></div>
        <div><span class="verdict ${vClass(g.verdict)}">${g.score}</span></div>
    </div>`;
}

function initDashboard() {
    const apply = G.filter(g => g.verdict === 'APPLY').length;
    const review = G.filter(g => g.verdict === 'REVIEW').length;
    const skip = G.filter(g => g.verdict === 'SKIP').length;
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat"><div class="stat-label">Összes pályázat</div><div class="stat-value">${G.length}</div><div class="stat-sub">+5 az elmúlt héten</div></div>
        <div class="stat"><div class="stat-label">Ajánlott</div><div class="stat-value" style="color: var(--green-600);">${apply}</div><div class="stat-sub">Azonnali teendő</div></div>
        <div class="stat"><div class="stat-label">Áttekintendő</div><div class="stat-value" style="color: var(--amber-600);">${review}</div><div class="stat-sub">Jogosultsági ellenőrzés</div></div>
        <div class="stat"><div class="stat-label">Kiszűrve</div><div class="stat-value" style="color: var(--gray-400);">${skip}</div><div class="stat-sub">Nem releváns</div></div>
    `;
    document.getElementById('hot-list').innerHTML = G.filter(g => g.score >= 85).sort((a,b) => a.days - b.days).slice(0, 5).map(renderRow).join('');
}

function initGrants() {
    document.getElementById('all-list').innerHTML = G.map(renderRow).join('');
    document.getElementById('grant-count').textContent = `${G.length} pályázat`;
}

function filterGrants() {
    const s = document.getElementById('search').value.toLowerCase();
    const v = document.getElementById('filter-verdict').value;
    const f = G.filter(g => {
        if (s && !g.title.toLowerCase().includes(s)) return false;
        if (v !== 'all' && g.verdict !== v) return false;
        return true;
    });
    document.getElementById('all-list').innerHTML = f.map(renderRow).join('');
    document.getElementById('grant-count').textContent = `${f.length} pályázat`;
    document.getElementById('nav-count').textContent = f.length;
}

function showDetail(id) {
    const g = G.find(x => x.id === id);
    if (!g) return;
    document.getElementById('detail-title').textContent = g.title;
    const dv = document.getElementById('detail-verdict');
    dv.className = `verdict ${vClass(g.verdict)}`;
    dv.textContent = `${g.score}/100 — ${vText(g.verdict)}`;

    const f = g.factors;
    const barColor = s => s >= 80 ? 'var(--green-500)' : s >= 60 ? 'var(--amber-600)' : 'var(--red-600)';
    const bar = (label, score) => `<div class="score-bar-row"><span class="bar-label">${label}</span><div class="bar-bg"><div class="bar-fill" style="width:${score}%;background:${barColor(score)};"></div></div><span class="bar-num">${score}</span></div>`;

    document.getElementById('detail-body').innerHTML = `
        <div class="detail-section">
            <h3>Alapadatok</h3>
            <div class="detail-row"><span class="label">Forrás</span><span class="value">${g.url ? `<a href="${g.url}" target="_blank" rel="noopener" style="color: var(--green-600); text-decoration: none;">${g.source} ↗</a>` : g.source}</span></div>
            <div class="detail-row"><span class="label">Kategória</span><span class="value">${g.cat}</span></div>
            <div class="detail-row"><span class="label">Összeg</span><span class="value">${g.amount}</span></div>
            <div class="detail-row"><span class="label">Határidő</span><span class="value" style="color: ${g.days < 30 ? 'var(--red-600)' : 'inherit'};">${g.deadline} (${g.days} nap)</span></div>
        </div>
        <div class="detail-section">
            <h3>AI Pontozás (${g.score}/100)</h3>
            <div class="score-bars">
                ${bar('Cégméret', f.size)}
                ${bar('Iparág', f.industry)}
                ${bar('Lokáció', f.location)}
                ${bar('Határidő', f.deadline)}
                ${bar('Preferencia', f.preference)}
            </div>
        </div>
        <div class="detail-section">
            <h3>Ajánlás</h3>
            <p style="font-size: 13px; color: var(--gray-600); line-height: 1.6;">

            </div>
        </div>` : ''}
        <div class="detail-section">
            <h3>Telegram értesítés előnézet</h3>
            <div style="background: #1a2332; color: #e8e8e8; border-radius: 12px; padding: 16px; font-size: 12px; line-height: 1.6; font-family: -apple-system, sans-serif;">
                <div style="color: #5eabed; font-weight: 600; margin-bottom: 8px;">🎯 GrantPilot</div>
                <div style="font-weight: 600; margin-bottom: 6px;">${g.title.slice(0, 60)}</div>
                <div style="color: #8e9ba8;">📊 Pontszám: ${g.score}/100 | ${vText(g.verdict)}</div>
                <div style="color: #8e9ba8;">💰 ${g.amount} | 📅 ${g.deadline}</div>
                <div style="color: #8e9ba8;">📂 ${g.cat}</div>
                <div style="margin-top: 8px; color: #8e9ba8; font-style: italic; font-size: 11px;">${g.verdict === 'APPLY' ? 'Javasolt: azonnali pályázatkészítés.' : g.verdict === 'REVIEW' ? 'Érdemes áttekinteni.' : 'Nem ajánlott.'}</div>
            </div>
            <div style="font-size: 11px; color: var(--gray-400); margin-top: 6px;">Így néz ki az értesítés a Telegram-on</div>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 8px;">
            <button class="btn-sm primary" style="flex: 1;" onclick="closeDetail()">Pályázatíró ajánlás kérése</button>
            <button class="btn-sm" onclick="closeDetail()">Bezárás</button>
        </div>
    `;

    document.getElementById('detail-overlay').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
}

function initAlerts() {
    document.getElementById('alerts-card').innerHTML = ALERTS.map(a => `
        <div class="alert-item">
            <div class="alert-dot ${a.color}"></div>
            <div><div class="alert-title">${a.title}</div><div class="alert-text">${a.text}</div><div class="alert-time">${a.time}</div></div>
        </div>
    `).join('');
}

function initProfile() {
    document.getElementById('profile-card').innerHTML = `
        <div class="profile-section">
            <div class="profile-header">
                <div class="profile-avatar">DV</div>
                <div><div class="profile-name">Demo Vállalkozás Kft.</div><div class="profile-meta">Budapest · IT / Szoftverfejlesztés · 25 fő</div></div>
            </div>
            <div class="detail-section">
                <h3>Cégadatok</h3>
                <div class="detail-row"><span class="label">Székhely</span><span class="value">1052 Budapest, Váci utca 10.</span></div>
                <div class="detail-row"><span class="label">Iparág</span><span class="value">IT / Szoftverfejlesztés</span></div>
                <div class="detail-row"><span class="label">Létszám</span><span class="value">25 fő</span></div>
                <div class="detail-row"><span class="label">Árbevétel</span><span class="value">€800,000</span></div>
                <div class="detail-row"><span class="label">Működés</span><span class="value">4 éve</span></div>
                <div class="detail-row"><span class="label">Csomag</span><span class="value" style="color: var(--green-600); font-weight: 700;">Professional</span></div>
            </div>
            <div class="detail-section">
                <h3>Preferált kategóriák</h3>
                <div class="tag-list">
                    <span class="tag">KKV fejlesztés</span>
                    <span class="tag">Digitális átalakulás</span>
                    <span class="tag">Kutatás-fejlesztés</span>
                    <span class="tag">Export</span>
                </div>
            </div>
        </div>
    `;
}

function runScan() {
    const btn = document.getElementById('scan-btn');
    btn.disabled = true; btn.textContent = 'Keresés...';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Keresés indítása'; }, 3000);
}

function exportCSV() {
    let csv = 'Azonosító,Cím,Forrás,Kategória,Összeg,Határidő,Hátralévő nap,Pontszám,Minősítés\n';
    G.forEach(g => csv += `"${g.id}","${g.title}","${g.source}","${g.cat}","${g.amount}","${g.deadline}",${g.days},${g.score},"${vText(g.verdict)}"\n`);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'grantpilot-export.csv'; a.click();
}

// Init
document.getElementById('nav-count').textContent = G.length;
initDashboard();
</script>
</body>
</html>
